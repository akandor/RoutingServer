<section id="auth-card" class="card auth-card-center" style="display:none;">
  <h1 style="margin: 0 0 10px 0; font-size: 28px;" data-i18n="auth.title">Routing Server Admin</h1>
  <div class="section-title" style="justify-content:center;"><h3 style="margin:0;" data-i18n="auth.signin">Sign in</h3></div>
  <form id="login-form" class="toolbar" style="justify-content:center;">
    <input id="login-username" data-i18n-placeholder="auth.username" placeholder="Username" required class="w-200" />
    <input id="login-password" type="password" data-i18n-placeholder="auth.password" placeholder="Password" required class="w-200" />
    <button type="submit" class="icon-btn" data-i18n-title="auth.login" data-i18n-aria="auth.login" title="Login" aria-label="Login"><i class="fa-solid fa-right-to-bracket"></i></button>
  </form>
</section>
