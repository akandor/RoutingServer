<section id="tokens-card" class="card" style="display:none;">
  <div class="section-title">
    <h3 style="margin:0;" data-i18n="tokens.title">Tokens</h3>
    <button id="show-add-token" class="icon-btn btn-green" data-i18n-title="tokens.addToken" data-i18n-aria="tokens.addToken" title="Add new token user" aria-label="Add new token user">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>
  <table style="width:100%;" class="table-scroll">
    <thead>
      <tr>
        <th data-i18n="tokens.username">Username</th>
        <th data-i18n="tokens.token">Token</th>
        <th data-i18n="tokens.actions">Actions</th>
      </tr>
    </thead>
    <tbody id="tokens-body"></tbody>
  </table>
</section>
