<header>
  <div>
    <div style="display:flex; align-items:center; gap:8px;">
      <i class="fa-solid fa-diagram-project"></i>
      <h1 data-i18n="app.name">Routing Server</h1>
    </div>
    <div class="muted" data-i18n="app.subtitle">Admin Panel</div>
  </div>
  <div class="theme-toggle">
    <div class="language-switcher">
      <i class="fa-solid fa-globe"></i>
      <select id="languageSelect" class="language-select">
        <option value="en">EN</option>
        <option value="de">DE</option>
      </select>
    </div>
    <i id="themeIcon" class="fa-solid fa-sun"></i>
    <div id="themeSwitch" class="theme-switch"><i></i></div>
    <button id="logoutBtn" class="icon-btn btn-icon-secondary" data-i18n-title="auth.logout" data-i18n-aria="auth.logout" title="Logout" aria-label="Logout" style="display:none;">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>
</header>
